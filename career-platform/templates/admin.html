<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 职引未来</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">职引未来 - 后台管理</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">返回前台</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">退出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-3 mb-4">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active" data-section="dashboard">数据概览</a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="users">用户管理</a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="internships">岗位管理</a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="applications">投递管理</a>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-9">
                <!-- 数据概览 -->
                <div class="section-content" id="dashboard">
                    <h4 class="mb-4">数据概览</h4>

                    <div class="row mb-4">
                        <div class="col-md-3 mb-3">
                            <div class="stat-card bg-primary text-white">
                                <h3 id="statStudents">0</h3>
                                <p>学生用户</p>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="stat-card bg-success text-white">
                                <h3 id="statCompanies">0</h3>
                                <p>企业用户</p>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="stat-card bg-info text-white">
                                <h3 id="statInternships">0</h3>
                                <p>在招岗位</p>
                            </div>
                        </div>
                        <div class="col-md-3 mb-3">
                            <div class="stat-card bg-warning text-white">
                                <h3 id="statApplications">0</h3>
                                <p>投递记录</p>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">用户分布</h5>
                                </div>
                                <div class="card-body">
                                    <canvas id="userChart"></canvas>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6 mb-4">
                            <div class="card">
                                <div class="card-header">
                                    <h5 class="mb-0">近期投递趋势</h5>
                                </div>
                                <div class="card-body">
                                    <canvas id="trendChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 用户管理 -->
                <div class="section-content" id="users" style="display: none;">
                    <h4 class="mb-4">用户管理</h4>
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户名</th>
                                        <th>角色</th>
                                        <th>学校/单位</th>
                                        <th>注册时间</th>
                                    </tr>
                                </thead>
                                <tbody id="usersTable">
                                    <!-- 由 JS 加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 岗位管理 -->
                <div class="section-content" id="internships" style="display: none;">
                    <h4 class="mb-4">岗位管理</h4>
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>标题</th>
                                        <th>公司</th>
                                        <th>地点</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody id="internshipsTable">
                                    <!-- 由 JS 加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 投递管理 -->
                <div class="section-content" id="applications" style="display: none;">
                    <h4 class="mb-4">投递管理</h4>
                    <div class="card">
                        <div class="card-body">
                            <table class="table table-striped">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>岗位</th>
                                        <th>状态</th>
                                        <th>投递时间</th>
                                    </tr>
                                </thead>
                                <tbody id="applicationsTable">
                                    <!-- 由 JS 加载 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        // 检查管理员权限
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (user.role !== 'admin') {
            alert('需要管理员权限');
            window.location.href = '/login';
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                if (data.success) {
                    const stats = data.data;

                    // 更新数字
                    document.getElementById('statStudents').textContent = stats.users.student || 0;
                    document.getElementById('statCompanies').textContent = stats.users.enterprise || 0;
                    document.getElementById('statInternships').textContent = stats.internships || 0;

                    const totalApplications = Object.values(stats.applications || {}).reduce((a, b) => a + b, 0);
                    document.getElementById('statApplications').textContent = totalApplications;

                    // 用户分布饼图
                    const userCtx = document.getElementById('userChart').getContext('2d');
                    new Chart(userCtx, {
                        type: 'pie',
                        data: {
                            labels: ['学生', '企业', '管理员'],
                            datasets: [{
                                data: [stats.users.student || 0, stats.users.enterprise || 0, stats.users.admin || 0],
                                backgroundColor: ['#0d6efd', '#198754', '#6c757d']
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: {
                                    position: 'bottom'
                                }
                            }
                        }
                    });

                    // 投递趋势图
                    const trendCtx = document.getElementById('trendChart').getContext('2d');
                    const trendData = stats.trend || [];
                    new Chart(trendCtx, {
                        type: 'line',
                        data: {
                            labels: trendData.map(d => d.date?.substring(5) || '未知'),
                            datasets: [{
                                label: '投递数量',
                                data: trendData.map(d => d.count),
                                borderColor: '#0d6efd',
                                tension: 0.3,
                                fill: true,
                                backgroundColor: 'rgba(13, 110, 253, 0.1)'
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: true
                                }
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('加载统计失败');
            }
        }

        // 切换标签页
        document.querySelectorAll('[data-section]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = e.target.dataset.section;

                document.querySelectorAll('.list-group-item').forEach(item => {
                    item.classList.remove('active');
                });
                e.target.classList.add('active');

                document.querySelectorAll('.section-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(section).style.display = 'block';
            });
        });

        loadStats();
    </script>
</body>
</html>
