<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章详情 - 职引未来</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">职引未来</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/internships">实习岗位</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/articles">经验分享</a></li>
                    <li class="nav-item" id="navProfile" style="display: none;"><a class="nav-link" href="/profile">个人中心</a></li>
                    <li class="nav-item" id="navLogin"><a class="nav-link" href="/login">登录</a></li>
                    <li class="nav-item" id="navLogout" style="display: none;"><a class="nav-link" href="#" onclick="logout()">退出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="/articles">经验分享</a></li>
                        <li class="breadcrumb-item active">文章详情</li>
                    </ol>
                </nav>

                <div id="loading" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">加载中...</span>
                    </div>
                </div>

                <div id="articleContent" style="display: none;">
                    <div class="card mb-4">
                        <div class="card-body">
                            <h2 id="articleTitle" class="mb-3">文章标题</h2>
                            <div class="text-muted small mb-4">
                                <span class="badge bg-secondary" id="articleCategory">分类</span>
                                <span class="ms-3">作者：<span id="articleAuthor"></span></span>
                                <span class="ms-3">👁 <span id="articleViews"></span> 次阅读</span>
                                <span class="ms-3">📅 <span id="articleDate"></span></span>
                            </div>
                            <hr>
                            <div id="articleBody" class="article-content">
                                <!-- 文章内容 -->
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-block text-center">
                        <a href="/articles" class="btn btn-outline-secondary">返回列表</a>
                        <a href="/internships" class="btn btn-primary">浏览实习岗位</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        const articleId = window.location.pathname.split('/').pop();

        // 加载文章详情
        async function loadArticle() {
            try {
                const response = await fetch(`/api/articles/${articleId}`);
                const data = await response.json();

                if (data.success) {
                    renderArticle(data.data);
                } else {
                    document.getElementById('loading').innerHTML = '<p class="text-danger">文章不存在</p>';
                }
            } catch (error) {
                document.getElementById('loading').innerHTML = '<p class="text-danger">加载失败</p>';
            }
        }

        // 渲染文章
        function renderArticle(article) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('articleContent').style.display = 'block';

            document.getElementById('articleTitle').textContent = article.title;
            document.getElementById('articleCategory').textContent = article.category || '其他';
            document.getElementById('articleAuthor').textContent = article.username;
            document.getElementById('articleViews').textContent = article.views || 0;
            document.getElementById('articleDate').textContent = new Date(article.created_at).toLocaleDateString('zh-CN');
            document.getElementById('articleBody').innerHTML = `<p style="white-space: pre-line;">${article.content || '暂无内容'}</p>`;
        }

        loadArticle();
    </script>
</body>
</html>
