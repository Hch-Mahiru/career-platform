<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经验分享 - 职引未来</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">职引未来</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/internships">实习岗位</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/articles">经验分享</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assessment">职业测评</a></li>
                    <li class="nav-item" id="navProfile" style="display: none;"><a class="nav-link" href="/profile">个人中心</a></li>
                    <li class="nav-item" id="navLogin"><a class="nav-link" href="/login">登录</a></li>
                    <li class="nav-item" id="navLogout" style="display: none;"><a class="nav-link" href="#" onclick="logout()">退出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- 分类侧边栏 -->
            <div class="col-md-3 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">文章分类</h5>
                    </div>
                    <div class="list-group list-group-flush">
                        <a href="#" class="list-group-item list-group-item-action category-link active" data-category="">全部分类</a>
                        <a href="#" class="list-group-item list-group-item-action category-link" data-category="面试经验">面试经验</a>
                        <a href="#" class="list-group-item list-group-item-action category-link" data-category="简历指导">简历指导</a>
                        <a href="#" class="list-group-item list-group-item-action category-link" data-category="实习经验">实习经验</a>
                        <a href="#" class="list-group-item list-group-item-action category-link" data-category="职业发展">职业发展</a>
                    </div>
                </div>

                <div class="card mt-4">
                    <div class="card-header">
                        <h5 class="mb-0">阅读排行</h5>
                    </div>
                    <div class="card-body" id="topArticles">
                        <!-- 由 JS 加载 -->
                    </div>
                </div>
            </div>

            <!-- 文章列表 -->
            <div class="col-md-9">
                <h4 class="mb-4">经验分享</h4>
                <div id="articlesList">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">大学生职业规划与实习对接平台 - 职引未来</p>
        </div>
    </footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        // 加载文章
        async function loadArticles(category = '') {
            try {
                const url = category ? `/api/articles?category=${category}` : '/api/articles';
                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    renderArticles(data.data);
                }
            } catch (error) {
                document.getElementById('articlesList').innerHTML = '<p class="text-danger">加载失败</p>';
            }
        }

        // 渲染文章列表
        function renderArticles(articles) {
            const container = document.getElementById('articlesList');

            if (articles.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-5">暂无文章</p>';
                return;
            }

            let html = '<div class="list-group">';
            articles.forEach(article => {
                const date = new Date(article.created_at).toLocaleDateString('zh-CN');
                html += `
                    <a href="/article/${article.id}" class="list-group-item list-group-item-action">
                        <div class="d-flex w-100 justify-content-between">
                            <h5 class="mb-1">${article.title}</h5>
                            <span class="badge bg-secondary">${article.category || '其他'}</span>
                        </div>
                        <p class="mb-1 text-muted">${article.content?.substring(0, 100)}...</p>
                        <div class="d-flex justify-content-between">
                            <small class="text-muted">作者：${article.username}</small>
                            <small class="text-muted">
                                <span>👁 ${article.views || 0}</span>
                                <span class="ms-3">📅 ${date}</span>
                            </small>
                        </div>
                    </a>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // 分类切换
        document.querySelectorAll('.category-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.category-link').forEach(l => l.classList.remove('active'));
                e.target.classList.add('active');
                loadArticles(e.target.dataset.category);
            });
        });

        loadArticles();
    </script>
</body>
</html>
