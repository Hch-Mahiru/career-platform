<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 职引未来</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">用户登录</h2>

                        <div class="alert alert-danger" id="errorMsg" style="display: none;"></div>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control" id="username" required placeholder="请输入用户名">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密码</label>
                                <input type="password" class="form-control" id="password" required placeholder="请输入密码">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">登录类型</label>
                                <select class="form-select" id="role">
                                    <option value="student">学生</option>
                                    <option value="enterprise">企业</option>
                                    <option value="admin">管理员</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">登录</button>
                        </form>

                        <div class="text-center mt-3">
                            <p>还没有账号？<a href="/register">立即注册</a></p>
                        </div>

                        <div class="mt-4 p-3 bg-light rounded">
                            <small class="text-muted">
                                <strong>测试账号：</strong><br>
                                学生：student1 / 123456<br>
                                企业：hr1 / 123456<br>
                                管理：admin / 123456
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, role })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/profile';
                } else {
                    document.getElementById('errorMsg').textContent = data.message;
                    document.getElementById('errorMsg').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = '登录失败，请稍后重试';
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
