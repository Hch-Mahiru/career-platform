<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 职引未来</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">职引未来</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="/internships">实习岗位</a></li>
                    <li class="nav-item"><a class="nav-link" href="/articles">经验分享</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assessment">职业测评</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/profile">个人中心</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">退出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- 侧边栏 -->
            <div class="col-md-3 mb-4">
                <div class="card">
                    <div class="card-body text-center">
                        <div class="avatar-circle mb-3">
                            <span id="avatarLetter">U</span>
                        </div>
                        <h5 id="userName">用户</h5>
                        <p class="text-muted" id="userSchool"></p>
                    </div>
                </div>

                <div class="list-group mt-3">
                    <a href="#" class="list-group-item list-group-item-action active" data-section="overview">我的概览</a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="applications">我的投递</a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="resume">我的简历</a>
                    <a href="#" class="list-group-item list-group-item-action" data-section="assessment">测评记录</a>
                </div>
            </div>

            <!-- 主内容区 -->
            <div class="col-md-9">
                <!-- 概览 -->
                <div class="section-content" id="overview">
                    <div class="card">
                        <div class="card-header">我的概览</div>
                        <div class="card-body">
                            <div class="row text-center">
                                <div class="col-md-4 mb-3">
                                    <div class="stat-card">
                                        <h3 id="applyCount">0</h3>
                                        <p>已投递</p>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <div class="stat-card">
                                        <h3 id="interviewCount">0</h3>
                                        <p>面试中</p>
                                    </div>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <div class="stat-card">
                                        <h3 id="resumeComplete">0%</h3>
                                        <p>简历完整度</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <h5>快捷操作</h5>
                                <div class="d-grid gap-2 d-md-block">
                                    <a href="/resume" class="btn btn-primary">完善简历</a>
                                    <a href="/internships" class="btn btn-outline-primary">浏览岗位</a>
                                    <a href="/assessment" class="btn btn-outline-primary">职业测评</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 我的投递 -->
                <div class="section-content" id="applications" style="display: none;">
                    <div class="card">
                        <div class="card-header">我的投递记录</div>
                        <div class="card-body">
                            <div id="applicationsList">
                                <p class="text-muted text-center">暂无投递记录</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 我的简历 -->
                <div class="section-content" id="resume" style="display: none;">
                    <div class="card">
                        <div class="card-header">我的简历</div>
                        <div class="card-body">
                            <div id="resumePreview">
                                <p class="text-muted">您还没有创建简历</p>
                                <a href="/resume" class="btn btn-primary">创建简历</a>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 测评记录 -->
                <div class="section-content" id="assessment" style="display: none;">
                    <div class="card">
                        <div class="card-header">我的测评记录</div>
                        <div class="card-body">
                            <p class="text-muted">暂无测评记录</p>
                            <a href="/assessment" class="btn btn-primary">开始测评</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        checkLoginStatus();

        // 切换标签页
        document.querySelectorAll('[data-section]').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const section = e.target.dataset.section;

                document.querySelectorAll('.list-group-item').forEach(item => {
                    item.classList.remove('active');
                });
                e.target.classList.add('active');

                document.querySelectorAll('.section-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(section).style.display = 'block';

                if (section === 'applications') {
                    loadApplications();
                }
            });
        });

        // 加载用户信息
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        document.getElementById('userName').textContent = user.username || '用户';
        document.getElementById('avatarLetter').textContent = (user.username || 'U')[0].toUpperCase();

        // 加载投递记录
        async function loadApplications() {
            try {
                const response = await fetch('/api/my-applications');
                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    let html = '<div class="list-group">';
                    data.data.forEach(app => {
                        const statusClass = app.status === 'pending' ? 'warning' : (app.status === 'accepted' ? 'success' : 'secondary');
                        const statusText = app.status === 'pending' ? '待处理' : (app.status === 'accepted' ? '已通过' : '已结束');
                        html += `
                            <div class="list-group-item">
                                <div class="d-flex w-100 justify-content-between">
                                    <h5 class="mb-1">${app.title}</h5>
                                    <span class="badge bg-${statusClass}">${statusText}</span>
                                </div>
                                <p class="mb-1">${app.company_name} | ${app.salary} | ${app.location}</p>
                                <small class="text-muted">投递时间：${new Date(app.applied_at).toLocaleDateString()}</small>
                            </div>
                        `;
                    });
                    html += '</div>';
                    document.getElementById('applicationsList').innerHTML = html;
                    document.getElementById('applyCount').textContent = data.data.length;
                }
            } catch (error) {
                console.error('加载失败');
            }
        }

        // 页面加载时检查登录状态
        function checkLoginStatus() {
            const user = localStorage.getItem('user');
            if (!user) {
                window.location.href = '/login';
            }
        }
    </script>
</body>
</html>
