<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实习岗位 - 职引未来</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">职引未来</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/internships">实习岗位</a></li>
                    <li class="nav-item"><a class="nav-link" href="/articles">经验分享</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assessment">职业测评</a></li>
                    <li class="nav-item" id="navProfile" style="display: none;"><a class="nav-link" href="/profile">个人中心</a></li>
                    <li class="nav-item" id="navLogin"><a class="nav-link" href="/login">登录</a></li>
                    <li class="nav-item" id="navRegister"><a class="nav-link" href="/register">注册</a></li>
                    <li class="nav-item" id="navLogout" style="display: none;"><a class="nav-link" href="#" onclick="logout()">退出</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <!-- 筛选侧边栏 -->
            <div class="col-md-3 mb-4">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">筛选条件</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">城市</label>
                            <select class="form-select" id="filterLocation">
                                <option value="">全部</option>
                                <option value="北京">北京</option>
                                <option value="上海">上海</option>
                                <option value="广州">广州</option>
                                <option value="深圳">深圳</option>
                                <option value="杭州">杭州</option>
                                <option value="南京">南京</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">类型</label>
                            <select class="form-select" id="filterType">
                                <option value="">全部</option>
                                <option value="实习">实习</option>
                                <option value="全职">全职</option>
                            </select>
                        </div>
                        <button class="btn btn-primary w-100" onclick="filterInternships()">筛选</button>
                        <button class="btn btn-outline-secondary w-100 mt-2" onclick="resetFilter()">重置</button>
                    </div>
                </div>
            </div>

            <!-- 岗位列表 -->
            <div class="col-md-9">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4>实习岗位列表</h4>
                    <span class="text-muted" id="totalCount">共 0 个岗位</span>
                </div>

                <div id="internshipsList">
                    <!-- 加载中 -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">大学生职业规划与实习对接平台 - 职引未来</p>
        </div>
    </footer>

    <script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
    <script>
        let allInternships = [];

        // 加载实习岗位
        async function loadInternships() {
            try {
                const response = await fetch('/api/internships');
                const data = await response.json();

                if (data.success) {
                    allInternships = data.data;
                    renderInternships(data.data);
                }
            } catch (error) {
                document.getElementById('internshipsList').innerHTML = '<p class="text-danger text-center">加载失败</p>';
            }
        }

        // 渲染岗位列表
        function renderInternships(internships) {
            const container = document.getElementById('internshipsList');
            document.getElementById('totalCount').textContent = `共 ${internships.length} 个岗位`;

            if (internships.length === 0) {
                container.innerHTML = '<p class="text-muted text-center py-5">暂无符合条件的岗位</p>';
                return;
            }

            try {
                let html = '<div class="list-group">';
                internships.forEach(item => {
                    // 对动态内容进行简单的HTML转义，防止XSS和模板字符串中断
                    const title = escapeHtml(item.title || '');
                    const salary = escapeHtml(item.salary || '');
                    const company = escapeHtml(item.company_name || '');
                    const location = escapeHtml(item.location || '');
                    const type = escapeHtml(item.type || '');
                    const desc = escapeHtml((item.description || '').substring(0, 80));
                    const deadline = escapeHtml(item.deadline || '');

                    html += `
                        <a href="/internship/${item.id}" class="list-group-item list-group-item-action">
                            <div class="d-flex w-100 justify-content-between">
                                <h5 class="mb-1">${title}</h5>
                                <span class="text-primary fw-bold">${salary}</span>
                            </div>
                            <p class="mb-1">
                                <span class="badge bg-primary">${company}</span>
                                <span class="badge bg-secondary">${location}</span>
                                <span class="badge bg-info">${type}</span>
                            </p>
                            <p class="mb-1 text-muted small">${desc}...</p>
                            <small class="text-muted">截止日期：${deadline}</small>
                        </a>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('渲染岗位列表时出错:', error);
                container.innerHTML = '<p class="text-danger text-center py-5">加载岗位数据时发生错误，请刷新页面重试</p>';
            }
        }

        // 简单的HTML转义函数
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 筛选
        function filterInternships() {
            const location = document.getElementById('filterLocation').value;
            const type = document.getElementById('filterType').value;

            let filtered = allInternships;
            if (location) {
                filtered = filtered.filter(i => i.location === location);
            }
            if (type) {
                filtered = filtered.filter(i => i.type === type);
            }

            renderInternships(filtered);
        }

        // 重置筛选
        function resetFilter() {
            document.getElementById('filterLocation').value = '';
            document.getElementById('filterType').value = '';
            renderInternships(allInternships);
        }

        loadInternships();
    </script>
</body>
</html>
